name: Repository CI

on:
  push:
  pull_request:

jobs:
  repository:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Root Design Docs
        run: bash starter-kit/scripts/lint-architecture.sh docs/design-docs

      - name: Check Root Markdown Links
        run: bash starter-kit/scripts/check-doc-links.sh .

      - name: Lint Starter Kit Design Docs
        run: bash starter-kit/scripts/lint-architecture.sh starter-kit/docs/design-docs

      - name: Check Starter Kit Markdown Links
        run: bash starter-kit/scripts/check-doc-links.sh starter-kit

      - name: Check Shell Script Syntax
        run: |
          bash -n starter-kit/scripts/check-doc-links.sh
          bash -n starter-kit/scripts/lint-architecture.sh
          bash -n skill/scripts/scan-project.sh
          bash -n scripts/sync-skill-targets.sh

      - name: Sync Skill Targets
        run: bash scripts/sync-skill-targets.sh

      - name: Verify Clean Worktree
        run: |
          if [[ -n "$(git status --short --untracked-files=all)" ]]; then
            git status --short --untracked-files=all
            exit 1
          fi
